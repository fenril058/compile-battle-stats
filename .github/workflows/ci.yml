name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: write # cache-nix-action が古い Nix ストアキャッシュを削除するために必要

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@2c9db80fb984ceb1bcaa77cdda3fdf8cfba92035 # v34
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
        # restore and save a cache using this key
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          # if there's no cache hit, restore a cache by this prefix
          restore-prefixes-first-match: nix-${{ runner.os }}-
          # collect garbage until the Nix store size (in bytes) is at most this number
          # before trying to save a new cache
          # 1G = 1073741824
          gc-max-store-size-linux: 1G
          # do purge caches
          purge: true
          # purge all versions of the cache
          purge-prefixes: nix-${{ runner.os }}-
          # created more than this number of seconds ago
          purge-created: 0
          # or last accessed this duration (ISO 8601 duration format)
          # before the start of the `Post Restore and save Nix store` phase
          purge-last-accessed: P1DT12H
          # except any version with the key that is the same as the `primary-key`
          purge-primary-key: never

      - name: Verify devShell
        run: nix develop .#default --command true

      - name: Audit (production deps)
        run: nix develop .#default --command npm audit --omit=dev --audit-level=moderate

      - name: Audit (all deps)
        run: nix develop .#default --command npm audit --audit-level=high

      - name: Lint workflows (ghalint)
        run: nix develop .#default --command ghalint run

      - name: Lint workflows (zizmor)
        run: nix develop .#default --command zizmor --offline --persona=pedantic .github/workflows

      - name: Verify action SHA pins (pinact)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: nix develop .#default --command pinact run --check

      - name: Lint
        run: nix develop .#default --command npm run check

      - name: Typecheck
        run: nix develop .#default --command npm run typecheck

      - name: Test
        run: nix develop .#default --command npm test

      - name: Build
        run: nix develop .#default --command npm run build
