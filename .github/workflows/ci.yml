name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: write # cache-nix-action が古い Nix ストアキャッシュを削除するために必要

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@9f63be77f412a248c9d9a65a4c82cf066cdf8f0c # v35
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 4G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      - name: Verify devShell
        run: nix develop .#ci --command true

      - name: Audit (production deps)
        run: nix develop .#ci --command npm audit --omit=dev --audit-level=moderate

      - name: Audit (all deps)
        run: nix develop .#ci --command npm audit --audit-level=high

      - name: Lint workflows (ghalint)
        run: nix develop .#ci --command ghalint run

      - name: Lint workflows (zizmor)
        run: nix develop .#ci --command zizmor --offline --persona=pedantic .github/workflows

      - name: Verify action SHA pins (pinact)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: nix develop .#ci --command pinact run --check

      - name: Lint
        run: nix develop .#ci --command npm run check

      - name: Test
        run: nix develop .#ci --command npm test

      - name: Build
        run: nix develop .#ci --command npm run build
