name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          use-flakehub: false

      - name: Verify devShell
        run: nix develop .#default --command true

      - name: Audit
        run: nix develop .#default --command npm audit --audit-level=high

      - name: Lint
        run: nix develop .#default --command npm run check

      - name: Typecheck
        run: nix develop .#default --command npm run typecheck

      - name: Test
        run: nix develop .#default --command npm test

      - name: Build
        run: nix develop .#default --command npm run build
