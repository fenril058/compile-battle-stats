name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Verify devShell
        run: nix develop .#default --command true

      - name: Audit (production deps)
        run: nix develop .#default --command npm audit --omit=dev --audit-level=moderate

      - name: Audit (all deps)
        run: nix develop .#default --command npm audit --audit-level=high

      - name: Lint workflows (ghalint)
        run: nix develop .#default --command ghalint run

      - name: Lint workflows (zizmor)
        run: nix develop .#default --command zizmor --offline --persona=pedantic .github/workflows

      - name: Verify action SHA pins (pinact)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: nix develop .#default --command pinact run --check

      - name: Lint
        run: nix develop .#default --command npm run check

      - name: Typecheck
        run: nix develop .#default --command npm run typecheck

      - name: Test
        run: nix develop .#default --command npm test

      - name: Build
        run: nix develop .#default --command npm run build
